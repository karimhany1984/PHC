<html lang="ar" dir="rtl">
<head>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('Service Worker registered successfully');
                
                // Check for updates every 60 seconds
                setInterval(() => {
                    reg.update();
                }, 60000);
                
                // Handle controller change (new SW takes over)
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        console.log('New Service Worker activated, reloading...');
                        // Use alert which always works
                        alert('🔄 تم تحديث التطبيق! سيتم إعادة التحميل الآن');
                        window.location.reload();
                    }
                });
                
                // Check if there's a waiting service worker
                if (reg.waiting) {
                    console.log('Found waiting service worker');
                    reg.waiting.postMessage({type: 'SKIP_WAITING'});
                }
                
            }).catch(err => {
                console.log('Service Worker registration failed:', err);
            });
        });
    }
</script>
<title>متابعة وحدات الرعاية الصحية الأولية</title>
<style>
/* Offline Arabic font stack - works without internet */
body { font-family: 'Segoe UI', 'Arial Unicode MS', 'Tahoma', 'Arial', sans-serif; }
</style>
<style>
    :root {
        --primary: #1a6faf;
        --primary-dark: #14578a;
        --primary-light: #e8f2fb;
        --primary-mid: #c6dff5;
        --accent: #e8a020;
        --accent-light: #fef3dc;
        --green: #1a8a4a;
        --green-light: #e3f5eb;
        --red: #c0392b;
        --red-light: #fdecea;
        --orange: #d35400;
        --orange-light: #fef0e7;
        --bg: #f0f4f8;
        --surface: #ffffff;
        --surface2: #f7f9fc;
        --border: #d4dde8;
        --border-light: #e8eef5;
        --text: #1a2533;
        --text-muted: #5a6a7e;
        --text-dim: #8a9ab0;
        --shadow-sm: 0 1px 4px rgba(26,111,175,0.08);
        --shadow: 0 2px 12px rgba(26,111,175,0.12);
        --shadow-lg: 0 4px 24px rgba(26,111,175,0.15);
        --radius: 12px;
        --radius-sm: 8px;
        --header-h: calc(60px + env(safe-area-inset-top, 0px));
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --mob-nav-h: calc(58px + var(--safe-area-bottom));
    }

/* Reset & Base */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  
  min-height: -webkit-fill-available;
}
body.menu-open {
  overflow: hidden; /* lock scroll ONLY when menu open */
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  font-size: 14px;
}

.app-layout {
  min-height: -webkit-fill-available;
}

/* ========== HEADER ========== */
.app-header {
  position: fixed;
  top: 0;
  right: 0;
  left: 0;
  height: var(--header-h);
  background: var(--primary);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: env(safe-area-inset-top, 0px) 16px 0 16px;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.header-logo .icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-titles {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.header-titles .t1 {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-titles .t2 {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.75);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: none;
}

@media (min-width: 600px) {
  .header-titles .t2 { display: block; }
}

.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

.hbtn {
  height: 34px;
  padding: 0 12px;
  border-radius: 7px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
  white-space: nowrap;
}

.hbtn-ghost { background: rgba(255, 255, 255, 0.15); color: #fff; }
.hbtn-ghost:hover, .hbtn-ghost:active { background: rgba(255, 255, 255, 0.25); }
.hbtn-white { background: #fff; color: var(--primary); }
.hbtn-white:hover, .hbtn-white:active { background: #e8f2fb; }
.hbtn-green { background: #27ae60; color: #fff; }
.hbtn-green:hover, .hbtn-green:active { background: #1e9050; }
.hbtn-accent { background: var(--accent); color: #fff; }
.hbtn-accent:hover, .hbtn-accent:active { background: #c8881a; }
.hbtn .icon-sm { font-size: 14px; }

@media (max-width: 599px) {
  .hbtn-desktop { display: none; }
}

/* ========== GLOBAL PROGRESS ========== */
.global-progress {
  position: fixed;
  top: var(--header-h);
  right: 0;
  left: 0;
  height: 4px;
  background: var(--primary-mid);
  z-index: 199;
}

.global-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s;
}

/* ========== LAYOUT ========== */
.app-layout {
  position: fixed;
  top: calc(var(--header-h) + 4px);
  bottom: var(--mob-nav-h);
  right: 0;
  left: 0;
  display: flex;
}

@media (min-width: 768px) {
  .app-layout { bottom: 0; }
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.25s ease-in-out;
}

.sidebar-inner {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }




@media (max-width: 360px) {
  .sidebar {
    width: 85%;
    max-width: 280px;
    min-width: 240px;
  }
}

.sidebar-head {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border-light);
  background: var(--primary-light);
  flex-shrink: 0;
}

.sidebar-head h3 {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sidebar-total {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  flex-wrap: wrap;
  gap: 6px;
}

.sidebar-total .score-big { font-size: 20px; font-weight: 900; color: var(--primary); }
.sidebar-total .score-max { font-size: 12px; color: var(--text-muted); }
.sidebar-total .pct-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 12px;
  background: var(--primary-light);
  color: var(--primary);
  white-space: nowrap;
}

/* Navigation Items */
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.12s;
  position: relative;
  min-height: 44px;
}

.nav-item:hover { background: var(--primary-light); }
.nav-item.active {
  background: var(--primary-light);
  border-right: 3px solid var(--primary);
}

.nav-item .nav-icon {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.nav-item.active .nav-icon { background: var(--primary); color: #fff; }
.nav-item .nav-text { flex: 1; min-width: 0; }
.nav-item .nav-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
.nav-item.active .nav-title { color: var(--primary); }
.nav-item .nav-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

.nav-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  flex-shrink: 0;
}

.pill-done { background: var(--green-light); color: var(--green); }
.pill-partial { background: var(--orange-light); color: var(--orange); }
.pill-empty { background: var(--border-light); color: var(--text-dim); }

/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  padding: 16px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.main-content {
  overscroll-behavior-y: contain;
}


    

.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ========== HOME SCREEN ========== */
.home-screen { max-width: 900px; margin: 0 auto; }

.home-hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border-radius: var(--radius);
  padding: 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.home-hero .hero-icon { font-size: 40px; }
.home-hero h1 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
.home-hero p { font-size: 13px; opacity: 0.85; line-height: 1.6; }

/* Upload Card */
.upload-card {
  background: var(--surface);
  border: 2px dashed var(--primary-mid);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 20px;
}

.upload-card:hover, .upload-card.drag-over {
  border-color: var(--primary);
  background: var(--primary-light);
}

.upload-card .up-icon { font-size: 32px; margin-bottom: 8px; }
.upload-card h3 { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.upload-card p { font-size: 12px; color: var(--text-muted); }
#fileInput { display: none; }

/* Meta Card */
.meta-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.meta-card h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 499px) {
  .meta-grid { grid-template-columns: 1fr; }
}

.meta-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.meta-field input, .meta-field select {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  transition: border-color 0.15s;
}

.meta-field input:focus, .meta-field select:focus {
  outline: none;
  border-color: var(--primary);
  background: #fff;
}

.meta-field select option { background: #fff; }

/* Nav Grid */
.nav-grid-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.nav-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-decoration: none;
  min-height: 44px;
}

.nav-card:hover, .nav-card:active {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.nav-card .nc-icon { font-size: 22px; }
.nav-card .nc-title { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.4; }
.nav-card .nc-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.nav-card .nc-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.nc-fill-high { background: var(--green); }
.nc-fill-mid { background: var(--orange); }
.nc-fill-low { background: var(--red); }
.nc-fill-zero { background: var(--border); }
.nav-card .nc-score { font-size: 11px; color: var(--text-muted); }

/* ========== SECTION VIEW ========== */
.section-view { max-width: 900px; margin: 0 auto; }

.section-title-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.stb-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.stb-text { flex: 1; }
.stb-text h2 { font-size: 16px; font-weight: 800; color: var(--primary); }
.stb-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.stb-score { text-align: center; flex-shrink: 0; }
.stb-score .big { font-size: 24px; font-weight: 900; color: var(--primary); }
.stb-score .small { font-size: 12px; color: var(--text-muted); }
.stb-score .pct {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  margin-top: 3px;
}

/* Legend */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
  font-size: 12px;
  color: var(--text-muted);
}

.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-2 { background: var(--green); }
.dot-1 { background: var(--orange); }
.dot-0 { background: var(--red); }
.dot-na { background: var(--text-dim); }

/* Subsections */
.subsec-title {
  background: var(--primary-light);
  border: 1px solid var(--primary-mid);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 14px;
}

.subsec-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
}

/* Item Row */
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.12s;
}

.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--surface2); }
.item-row.scored-2 { border-right: 6px solid var(--green); }
.item-row.scored-1 { border-right: 6px solid var(--orange); }
.item-row.scored-0 { border-right: 6px solid var(--red); }
.item-row.scored-na { border-right: 6px solid var(--text-dim); }

.item-num {
  min-width: 26px;
  height: 26px;
  background: var(--primary-light);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  flex-shrink: 0;
  margin-top: 1px;
}

.item-text {
  flex: 1;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  min-width: 0;
}

.item-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-start;
}

/* Score Buttons */
.sbtn, .sbtn-disabled {
  width: 38px;
  height: 34px;
  border: 2px solid var(--border);
  border-radius: 7px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

.sbtn {
  background: var(--surface2);
  color: var(--text-muted);
  cursor: pointer;
}

.sbtn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.sbtn:active { transform: scale(0.94); }

.sbtn.s0 { background: var(--red-light); border-color: var(--red); color: var(--red); }
.sbtn.s1 { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
.sbtn.s2 { background: var(--green-light); border-color: var(--green); color: var(--green); }
.sbtn.sna { background: var(--border-light); border-color: var(--text-dim); color: var(--text-dim); }

.sbtn-disabled {
  background: #2c2c2c;
  border-color: #333;
  color: #aaa;
  cursor: not-allowed;
  opacity: 0.6;
  pointer-events: none;
}

/* Note Button */
.nbtn {
  height: 34px;
  padding: 0 8px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.12s;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  gap: 3px;
}

.nbtn:hover, .nbtn:active { border-color: var(--accent); color: var(--accent); }
.nbtn.has-note { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* Note Area */
.note-area { padding: 0 14px 10px 14px; display: none; }
.note-area.open { display: block; }
.note-area textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  resize: vertical;
  min-height: 60px;
}
.note-area textarea:focus { outline: none; border-color: var(--accent); }

/* ========== SUMMARY ========== */
.summary-view { max-width: 900px; margin: 0 auto; }

.total-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius);
  padding: 20px 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.total-card .tc-left { flex: 1; min-width: 160px; }
.total-card h2 { font-size: 16px; font-weight: 800; }
.total-card p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.total-card .tc-right { text-align: center; }
.total-card .tc-score { font-size: 48px; font-weight: 900; line-height: 1; }
.total-card .tc-max { font-size: 14px; opacity: 0.75; margin-top: 4px; }
.total-card .tc-pct {
  font-size: 22px;
  font-weight: 800;
  margin-top: 8px;
  background: rgba(255, 255, 255, 0.2);
  padding: 4px 14px;
  border-radius: 20px;
  display: inline-block;
}

.sum-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.sum-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.sum-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.sum-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.sum-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.sum-scores { display: flex; align-items: center; justify-content: space-between; }

    @media (max-width: 767px) {

            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            height: auto;
        }

        .main-content {
            flex: 1;

            overscroll-behavior-y: contain;

            bottom: var(--mob-nav-h);
            right: 0;

            z-index: 150;
            transform: translate3d(100%, 0, 0);

            const eocd = new Uint8Array([0x50, 0x4B, 0x05, 0x06, 0x00, 0x00, 0x00, 0x00, ...u16le(cds.length), ...u16le(cds.length), ...u32le(cdSz), ...u32le(cdOff), 0x00, 0x00]);
            const total = cdOff + cdSz + eocd.length, out = new Uint8Array(total);
            let pos = 0;
            for (const lh of lhs) { out.set(lh, pos); pos += lh.length; }
            for (const cd of cds) { out.set(cd, pos); pos += cd.length; }
            out.set(eocd, pos);

        const _iosVer = (() => { const ua = navigator.userAgent; if (/iP(hone|od|ad)/.PHC(ua)) { const m = ua.match(/OS (\d+)_/); if (m) return parseInt(m[1], 10); } return 99; })();

        // Patch a single cell
        function patchCell(sheet, cellRef, value) {
            const esc = v => String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const repl = (m, attrs) => {
                const a = attrs.replace(/\s*t="[^"]*"/g, '');
                if (value === null || value === '' || value === undefined) return '<c r="' + cellRef + '"' + a + '/>';
                if (typeof value === 'number') return '<c r="' + cellRef + '"' + a + '><v>' + value + '</v></c>';
                return '<c r="' + cellRef + '"' + a + ' t="str"><v>' + esc(value) + '</v></c>';
            };
            sheet = sheet.replace(new RegExp('<c r="' + cellRef + '"([^/]*)/>'), repl);
            sheet = sheet.replace(new RegExp('<c r="' + cellRef + '"([^>]*)>[\s\S]*?<\/c>'), repl);
            return sheet;
        }

        // ═══════════════════════════════════════
        // TEMPLATE LOADER - FETCH EXTERNAL FILES

        // ── Template cache: loaded once at startup, reused on every export ─────
        let _cachedExcelTemplate = null;
        let _cachedWordTemplate  = null;

        async function _fetchWithTimeout(url, ms = 15000) {
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), ms);
            try {
                const r = await fetch(url, { signal: ctrl.signal });
                clearTimeout(tid);
                if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + url);
                return new Uint8Array(await r.arrayBuffer());
            } catch(e) { clearTimeout(tid); throw e; }
        }

        async function preloadTemplates() {
            const results = await Promise.allSettled([
                _fetchWithTimeout('./template.xlsx'),
                _fetchWithTimeout('./template.docx')
            ]);
            if (results[0].status === 'fulfilled') {
                _cachedExcelTemplate = results[0].value;
                console.log('[Templates] ✓ template.xlsx ready (' + _cachedExcelTemplate.length + ' bytes)');
            } else {
                console.warn('[Templates] ✗ template.xlsx failed:', results[0].reason);
            }
            if (results[1].status === 'fulfilled') {
                _cachedWordTemplate = results[1].value;
                console.log('[Templates] ✓ template.docx ready (' + _cachedWordTemplate.length + ' bytes)');
            } else {
                console.warn('[Templates] ✗ template.docx failed:', results[1].reason);
            }
        }

        async function loadExcelTemplate() {
            if (_cachedExcelTemplate) return _cachedExcelTemplate;
            showToast('جاري تحميل قالب Excel...');
            try {
                _cachedExcelTemplate = await _fetchWithTimeout('./template.xlsx');
                return _cachedExcelTemplate;
            } catch(e) {
                showToast(e.name === 'AbortError'
                    ? 'انتهت مهلة تحميل القالب — تأكد من وجود template.xlsx على الخادم'
                    : 'خطأ في تحميل قالب Excel: ' + e.message);
                throw e;
            }
        }

        async function loadWordTemplate() {
            if (_cachedWordTemplate) return _cachedWordTemplate;
            showToast('جاري تحميل قالب Word...');
            try {
                _cachedWordTemplate = await _fetchWithTimeout('./template.docx');
                return _cachedWordTemplate;
            } catch(e) {
                showToast('خطأ في تحميل قالب Word: ' + e.message);
                throw e;
            }
        }

        function getIOSVersion() {
            const ua = navigator.userAgent;
            if (/iP(hone|od|ad)/.PHC(ua)) {
                const match = ua.match(/OS (\d+)_/);
                if (match) return parseInt(match[1], 10);
            }
            return null;
        }

        function shouldUseExternalTemplate() {
            const iosVersion = getIOSVersion();
            if (iosVersion !== null && iosVersion <= 15) return true;
            return false;

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            showToast('جاري قراءة الملف...');
            try {
                const buf = new Uint8Array(await file.arrayBuffer());
                const files = await zipRead(buf);
                const sheet = new TextDecoder().decode(files['xl/worksheets/sheet1.xml']);
                const ss_xml = new TextDecoder().decode(files['xl/sharedStrings.xml']);
                const sheet2_xml = new TextDecoder().decode(files['xl/worksheets/sheet3.xml']);

                const readSheetCell = (sheetXml, sharedStrings, cellRef) => {
                    const re = new RegExp('<c\\s[^>]*r="' + cellRef + '"[^>]*>[\\s\\S]*?<\/c>');
                    const m = sheetXml.match(re);
                    if (!m) return '';
                    const xml = m[0];
                    const v = xml.match(/<v>([^<]*)<\/v>/);
                    if (!v) return '';
                    if (/\bt="s"/.PHC(xml)) return sharedStrings[parseInt(v[1])] || '';
                    if (/\bt="str"/.PHC(xml)) return v[1];
                    return v[1];
                };

                const ssItems = [];
                ss_xml.replace(/<si>([\s\S]*?)<\/si>/g, (m, inner) => {
                    let txt = '';
                    inner.replace(/<t[^>]*>([^<]*)<\/t>/g, (_, t) => { txt += t; });
                    ssItems.push(txt.trim());
                });

                const rawDates = readSheetCell(sheet2_xml, ssItems, 'F1');
                const rawHosp = readSheetCell(sheet2_xml, ssItems, 'D2');
                const rawInsp = readSheetCell(sheet2_xml, ssItems, 'F2');
                const rawType = readSheetCell(sheet2_xml, ssItems, 'D3');

                meta.dates = rawDates.trim();
                meta.hospitalName = rawHosp.trim();
                for (const [reg, units] of Object.entries(REGION_UNITS)) {
                  if (units.includes(meta.hospitalName)) { meta.region = reg; break; }
                }
                meta.inspectors = rawInsp.trim();
                meta.type = rawType.trim();

                scores = {};
                FORM_DATA.forEach(sec => {
                    let idx = 0;
                    sec.subsections.forEach(sub => sub.items.forEach(item => {
                        const mapKey = sec.key + '__' + idx;
                        const exRow = ROW_MAP[mapKey];
                        if (exRow) {
                            const cAddr = 'C' + exRow;
                            const cRe = new RegExp('<c\\s[^>]*r="' + cAddr + '"(?=[">/ ])[^>]*>(?:(?!<\/row>)[\\s\\S])*?<\/c>');
                            const cMatch = sheet.match(cRe);
                            if (cMatch) {
                                const vMatch = cMatch[0].match(/<v>([^<]*)<\/v>/);
                                if (vMatch) {
                                    let val = vMatch[1].trim();
                                    if (/\bt="s"/.PHC(cMatch[0])) {
                                        const ssIdx = parseInt(val);
                                        if (!isNaN(ssIdx) && ssItems[ssIdx] !== undefined) {
                                            val = ssItems[ssIdx];
                                        }
                                    }
                                    if (val === 'N/A') scores[mapKey] = 'N/A';
                                    else if (val === '0' || val === '0.0') scores[mapKey] = 0;
                                    else if (val === '1' || val === '1.0') scores[mapKey] = 1;
                                    else if (val === '2' || val === '2.0') scores[mapKey] = 2;
                                }
                            }
                            const dAddr = 'D' + exRow;
                            const dRe = new RegExp('<c\\s[^>]*r="' + dAddr + '"(?=[">/ ])[^>]*>(?:(?!<\/row>)[\\s\\S])*?<\/c>');
                            const dMatch = sheet.match(dRe);
                            if (dMatch) {
                                const vMatch = dMatch[0].match(/<v>([^<]*)<\/v>/);
                                if (vMatch && vMatch[1].trim()) {
                                    if (/\bt="s"/.PHC(dMatch[0])) {
                                        const ssIdx = parseInt(vMatch[1].trim());
                                        if (!isNaN(ssIdx) && ssItems[ssIdx]) notes[mapKey] = ssItems[ssIdx];
                                    } else {
                                        notes[mapKey] = vMatch[1].trim();
                                    }
                                }
                            }
                        }
                        idx++;
                    }));
                });
                updateMetaResult();
                saveToLocal();
                buildSidebarNav();
                updateProgress();
                showHome();
                showToast('✓ تم تحميل: ' + (meta.hospitalName || file.name));
            } catch (e) {
                console.error(e);
                showToast('خطأ في قراءة الملف: ' + e.message);
            }
            event.target.value = '';
        }

        function openMergeDialog() {
            document.getElementById('mergeInput').click();

        async function handleMergeUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            showToast('جاري قراءة التقرير المراد دمجه...');
            try {
                const buf = new Uint8Array(await file.arrayBuffer());
                const files = await zipRead(buf);
                const sheet = new TextDecoder().decode(files['xl/worksheets/sheet1.xml']);
                const ss_xml = new TextDecoder().decode(files['xl/sharedStrings.xml']);

                const ssItems = [];
                ss_xml.replace(/<si>([\s\S]*?)<\/si>/g, (m, inner) => {
                    let txt = '';
                    inner.replace(/<t[^>]*>([^<]*)<\/t>/g, (_, t) => { txt += t; });
                    ssItems.push(txt.trim());
                });

                const incomingScores = {};
                const incomingNotes  = {};

                FORM_DATA.forEach(sec => {
                    let idx = 0;
                    sec.subsections.forEach(sub => sub.items.forEach(() => {
                        const mapKey = sec.key + '__' + idx;
                        const exRow  = ROW_MAP[mapKey];
                        if (exRow) {
                            const cRe = new RegExp('<c\\s[^>]*r="C' + exRow + '"(?=[">/ ])[^>]*>(?:(?!<\/row>)[\\s\\S])*?<\/c>');
                            const cM  = sheet.match(cRe);
                            if (cM) {
                                const vM = cM[0].match(/<v>([^<]*)<\/v>/);
                                if (vM) {
                                    let val = vM[1].trim();
                                    if (/\bt="s"/.PHC(cM[0])) {
                                        const si = parseInt(val);
                                        if (!isNaN(si) && ssItems[si] !== undefined) val = ssItems[si];
                                    }
                                    if (val === 'N/A') incomingScores[mapKey] = 'N/A';
                                    else if (val === '0' || val === '0.0') incomingScores[mapKey] = 0;
                                    else if (val === '1' || val === '1.0') incomingScores[mapKey] = 1;
                                    else if (val === '2' || val === '2.0') incomingScores[mapKey] = 2;
                                }
                            }
                            const dRe = new RegExp('<c\\s[^>]*r="D' + exRow + '"(?=[">/ ])[^>]*>(?:(?!<\/row>)[\\s\\S])*?<\/c>');
                            const dM  = sheet.match(dRe);
                            if (dM) {
                                const vM = dM[0].match(/<v>([^<]*)<\/v>/);
                                if (vM && vM[1].trim()) {
                                    if (/\bt="s"/.PHC(dM[0])) {
                                        const si = parseInt(vM[1].trim());
                                        if (!isNaN(si) && ssItems[si]) incomingNotes[mapKey] = ssItems[si];
                                    } else {
                                        incomingNotes[mapKey] = vM[1].trim();
                                    }
                                }
                            }
                        }
                        idx++;
                    }));
                });

                const totalIncoming = Object.keys(incomingScores).length + Object.keys(incomingNotes).length;
                if (totalIncoming === 0) {
                    showToast('الملف المحمل لا يحتوي على بيانات للدمج');
                    event.target.value = '';
                    return;
                }

                const labelMap = {};
                FORM_DATA.forEach(sec => {
                    let idx = 0;
                    sec.subsections.forEach(sub => {
                        sub.items.forEach(item => {
                            labelMap[sec.key + '__' + idx] = {
                                section: sec.title,
                                text: item.text
                            };
                            idx++;
                        });
                    });
                });

                const conflicts = Object.keys(incomingScores).filter(
                    k => scores[k] !== undefined && incomingScores[k] !== undefined
                );
                const newEntries = Object.keys(incomingScores).filter(
                    k => scores[k] === undefined
                );

                const conflictDetails = conflicts.map(k => ({
                    key:      k,
                    label:    labelMap[k] || { section: '', text: k },
                    current:  scores[k],
                    incoming: incomingScores[k]
                }));

                function applyMerge(overwriteConflicts) {
                    let merged = 0, skipped = 0;

                    Object.keys(incomingScores).forEach(k => {
                        if (scores[k] !== undefined && !overwriteConflicts) {
                            skipped++;
                        } else {
                            scores[k] = incomingScores[k];
                            merged++;
                        }
                    });

                    Object.keys(incomingNotes).forEach(k => {
                        if (notes[k] && incomingNotes[k] && notes[k] !== incomingNotes[k]) {
                            notes[k] = notes[k] + ' | ' + incomingNotes[k];
                        } else if (incomingNotes[k]) {
                            notes[k] = incomingNotes[k];
                        }
                    });

                    updateMetaResult();
                    saveToLocal();
                    buildSidebarNav();
                    updateProgress();
                    showHome();

                    const msg = overwriteConflicts
                        ? ('✓ تم الدمج: ' + merged + ' سؤال مُحدَّث، ' + skipped + ' تجاوزناه')
                        : ('✓ تم الدمج: ' + merged + ' سؤال جديد أُضيف، ' + skipped + ' تجاوزناه');
                    showToast(msg);
                }

                if (conflicts.length > 0) {
                    showMergeConflictModal(conflictDetails, newEntries.length, applyMerge);
                } else {
                    applyMerge(false);
                }

            } catch (e) {
                console.error(e);
                showToast('خطأ في قراءة الملف: ' + e.message);
            }
            event.target.value = '';
        }

        function showMergeConflictModal(conflictDetails, newCount, applyMerge) {
            const scoreLabel = v => v === 'N/A' ? 'N/A' : v === 0 ? '0 ✗' : v === 1 ? '1 ◑' : v === 2 ? '2 ✓' : '—';
            const scoreColor = v => v === 0 ? '#e74c3c' : v === 1 ? '#e67e22' : v === 2 ? '#27ae60' : '#999';

            document.getElementById('mergeModalTitle').textContent = '⚠️ تعارض في البيانات';
            document.getElementById('mergeModalBody').innerHTML =
                'التقرير الجديد يحتوي على ' +
                '<strong>' + newCount + '</strong> سؤال جديد و' +
                '<strong> ' + conflictDetails.length + '</strong> سؤال متعارض (مُجاب في كلا التقريرين).<br>' +
                'راجع الأسئلة المتعارضة أدناه ثم اختر كيفية المعالجة:';

            let lastSection = '';
            const rows = conflictDetails.map(d => {
                let sectionHeader = '';
                if (d.label.section !== lastSection) {
                    lastSection = d.label.section;
                    sectionHeader = '<div style="background:var(--primary);color:#fff;padding:5px 10px;font-size:11px;font-weight:700;direction:rtl;">' +
                        d.label.section + '</div>';
                }
                const shortText = d.label.text.length > 90
                    ? d.label.text.slice(0, 90) + '…'
                    : d.label.text;
                return sectionHeader +
                    '<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--border-light);direction:rtl;">' +
                        '<div style="flex:1;font-size:12px;color:var(--text);line-height:1.4;">' + shortText + '</div>' +
                        '<div style="display:flex;gap:4px;flex-shrink:0;align-items:center;">' +
                            '<span style="font-size:10px;color:var(--text-muted);">حالي:</span>' +
                            '<span style="font-size:12px;font-weight:700;color:' + scoreColor(d.current)  + ';min-width:28px;text-align:center;">' + scoreLabel(d.current)  + '</span>' +
                            '<span style="font-size:14px;color:var(--text-dim);">→</span>' +
                            '<span style="font-size:10px;color:var(--text-muted);">جديد:</span>' +
                            '<span style="font-size:12px;font-weight:700;color:' + scoreColor(d.incoming) + ';min-width:28px;text-align:center;">' + scoreLabel(d.incoming) + '</span>' +
                        '</div>' +
                    '</div>';
            }).join('');

            document.getElementById('mergeConflictList').innerHTML = rows ||
                '<div style="padding:12px;text-align:center;color:var(--text-muted);">لا توجد تعارضات</div>';

            document.getElementById('mergeKeepBtn').onclick = () => {
                closeMergeModal();
                applyMerge(false);
            };
            document.getElementById('mergeOverwriteBtn').onclick = () => {
                closeMergeModal();
                applyMerge(true);
            };
            document.getElementById('mergeModalBg').style.display = 'flex';
        }

            document.getElementById('mergeModalBg').style.display = 'none';

            // This avoids the "break on unknown signature" bug and handles data descriptors.
            const files={};
            const dv=new DataView(buf.buffer,buf.byteOffset);
            // Find End Of Central Directory record (signature PK\x05\x06) scanning from end
            let eocdPos=-1;
            for(let i=buf.length-22;i>=0;i--){
                if(buf[i]===0x50&&buf[i+1]===0x4B&&buf[i+2]===0x05&&buf[i+3]===0x06){eocdPos=i;break;}
            }
            if(eocdPos<0){
                // Fallback: sequential scan of local file headers
                let pos=0;
                while(pos+30<buf.length){
                    if(buf[pos]===0x50&&buf[pos+1]===0x4B&&buf[pos+2]===0x03&&buf[pos+3]===0x04){
                        const comp=dv.getUint16(pos+8,true);
                        const cmpSz=dv.getUint32(pos+18,true);
                        const namLen=dv.getUint16(pos+26,true),extLen=dv.getUint16(pos+28,true);
                        const dataOff=pos+30+namLen+extLen;
                        const name=new TextDecoder().decode(buf.slice(pos+30,pos+30+namLen));
                        const cmpData=buf.slice(dataOff,dataOff+cmpSz);
                        files[name]=(comp===0)?cmpData:await _workerDecomp(cmpData);
                        pos=dataOff+cmpSz;
                    }else{pos++;} // skip unknown signature byte by byte
                }
                return files;
            }
            const cdOffset=dv.getUint32(eocdPos+16,true);
            const cdCount=dv.getUint16(eocdPos+8,true);
            let cdPos=cdOffset;
            for(let i=0;i<cdCount;i++){
                if(cdPos+46>buf.length)break;
                if(buf[cdPos]!==0x50||buf[cdPos+1]!==0x4B||buf[cdPos+2]!==0x01||buf[cdPos+3]!==0x02)break;
                const cdCmpSz=dv.getUint32(cdPos+20,true); // CD's compressed size (authoritative)
                const namLen=dv.getUint16(cdPos+28,true);
                const extLen=dv.getUint16(cdPos+30,true);
                const cmtLen=dv.getUint16(cdPos+32,true);
                const lfhOffset=dv.getUint32(cdPos+42,true);
                const name=new TextDecoder().decode(buf.slice(cdPos+46,cdPos+46+namLen));
                cdPos+=46+namLen+extLen+cmtLen;
                // Read local file header
                if(lfhOffset+30>buf.length)continue;
                const lComp=dv.getUint16(lfhOffset+8,true);
                let lCmpSz=dv.getUint32(lfhOffset+18,true);
                // Local header may have 0 sizes when data descriptor is used — fall back to CD
                if(lCmpSz===0)lCmpSz=cdCmpSz;
                const lNamLen=dv.getUint16(lfhOffset+26,true),lExtLen=dv.getUint16(lfhOffset+28,true);
                const dataOff=lfhOffset+30+lNamLen+lExtLen;
                if(dataOff+lCmpSz>buf.length)continue;
                const cmpData=buf.slice(dataOff,dataOff+lCmpSz);
                files[name]=(lComp===0)?cmpData:await _workerDecomp(cmpData);
            }
            return files;
        }

        async function _workerZipWrite(files) {
            const CRC_T=_workerCRC32Table();
            function crc32(data){let c=0xFFFFFFFF;for(let i=0;i<data.length;i++)c=CRC_T[(c^data[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
            const lhs=[],cds=[];let offset=0;
            for(const [name,rawData] of Object.entries(files)){
                const nb=new TextEncoder().encode(name);
                let comp=rawData,cm=0;
                if(typeof CompressionStream!=='undefined'){
                    try{
                        const cs=new CompressionStream('deflate-raw'),writer=cs.writable.getWriter(),reader=cs.readable.getReader(),chunks=[];
                        const pump=()=>reader.read().then(({done,value})=>{if(done)return;chunks.push(value);return pump();});
                        writer.write(rawData);writer.close();await pump();
                        const c=new Uint8Array(chunks.reduce((a,b)=>a+b.length,0));let p=0;for(const ch of chunks){c.set(ch,p);p+=ch.length;}
                        if(c.length<rawData.length){comp=c;cm=8;}
                    }catch(e){comp=rawData;cm=0;}
                }
                const crc=crc32(rawData);
                const u16=_workerU16le,u32=_workerU32le;
                lhs.push(new Uint8Array([0x50,0x4B,0x03,0x04,0x14,0x00,0x00,0x00,...u16(cm),0x00,0x00,0x00,0x00,...u32(crc),...u32(comp.length),...u32(rawData.length),...u16(nb.length),0x00,0x00,...nb,...comp]));
                cds.push(new Uint8Array([0x50,0x4B,0x01,0x02,0x1E,0x03,0x14,0x00,0x00,0x00,...u16(cm),0x00,0x00,0x00,0x00,...u32(crc),...u32(comp.length),...u32(rawData.length),...u16(nb.length),0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,...u32(offset),...nb]));
                offset+=lhs[lhs.length-1].length;
            }
            const cdOff=offset,cdSz=cds.reduce((a,b)=>a+b.length,0);
            const eocd=new Uint8Array([0x50,0x4B,0x05,0x06,0x00,0x00,0x00,0x00,..._workerU16le(cds.length),..._workerU16le(cds.length),..._workerU32le(cdSz),..._workerU32le(cdOff),0x00,0x00]);
            const total=cdOff+cdSz+eocd.length,out=new Uint8Array(total);
            let p=0;for(const lh of lhs){out.set(lh,p);p+=lh.length;}for(const cd of cds){out.set(cd,p);p+=cd.length;}out.set(eocd,p);
            return out;
        }

        function _workerPatchAllCells(xml, patches) {
            const map={};
            for(const [ref,val] of patches) map[ref]=val;
            const esc=v=>String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            return xml.replace(/<c r="([A-Z]+\d+)"([^/]*)(\/>)|<c r="([A-Z]+\d+)"([^>]*)>[\s\S]*?<\/c>/g,(m,r1,a1,selfClose,r2,a2)=>{
                const ref=r1||r2;
                if(!ref||!(ref in map))return m;
                const attrs=(a1!==undefined?a1:a2)||'';
                const value=map[ref];
                const a=attrs.replace(/\s*t="[^"]*"/g,'');
                if(value===null||value===''||value===undefined)return '<c r="'+ref+'"'+a+'/>';
                if(typeof value==='number')return '<c r="'+ref+'"'+a+'><v>'+value+'</v></c>';
                return '<c r="'+ref+'"'+a+' t="str"><v>'+esc(value)+'</v></c>';
            });
        }

        function _workerForceRecalc(xml) {
            if(xml.includes('<calcPr'))return xml.replace(/<calcPr[^>]*\/>/,'<calcPr calcId="1" fullCalcOnLoad="1"/>');
            return xml.replace(/(<[/]workbook>)/,'<calcPr calcId="1" fullCalcOnLoad="1"/>$1');
        }

        function _buildWorkerBlob() {
            // Serialize the above functions into a self-contained worker script
            const fns = [
                _workerCRC32Table, _workerU16le, _workerU32le,
                _workerDecomp, _workerZipRead, _workerZipWrite,
                _workerPatchAllCells, _workerForceRecalc
            ].map(f => f.toString()).join('\n\n');

            const handler = `
self.onmessage = async function(e) {
    const { templateBuf, scores, notes, ROW_MAP, meta } = e.data;
    try {
        postMessage({ status: 'progress', msg: 'فك ضغط القالب...' });
        const files = await _workerZipRead(new Uint8Array(templateBuf));

        let workbook = new TextDecoder().decode(files['xl/workbook.xml']);
        files['xl/workbook.xml'] = new TextEncoder().encode(_workerForceRecalc(workbook));

        let sheet1 = new TextDecoder().decode(files['xl/worksheets/sheet1.xml']);
        let sheet2 = new TextDecoder().decode(files['xl/worksheets/sheet2.xml']);
        let sheet3 = new TextDecoder().decode(files['xl/worksheets/sheet3.xml']);

        const patches1=[], patches2=[], patches3=[];
        patches3.push(['A3', 'المحافظة : الاسكندرية                                          تواريخ التقييم : ' + (meta.dates||'')]);
        patches3.push(['A4', 'إسم المركز / الوحدة : ' + (meta.hospitalName||'') + '                                إسم القائم بالتقييم : ' + (meta.inspectors||'')]);

        for (const [ik, rawRow] of Object.entries(ROW_MAP)) {
            const onSheet2 = rawRow < 0;
            const xRow = Math.abs(rawRow);
            const sc = scores[ik];
            const note = notes[ik] || '';
            if (onSheet2) {
                if (sc==='N/A') patches2.push(['G'+xRow,'N/A']);
                else if (sc!==undefined&&sc!==null) patches2.push(['G'+xRow, sc]);
                patches2.push(['F'+xRow, note]);
            } else {
                if (sc==='N/A') patches1.push(['E'+xRow,'N/A']);
                else if (sc!==undefined&&sc!==null) patches1.push(['E'+xRow, sc]);
                patches1.push(['F'+xRow, note]);
            }
        }

        postMessage({ status: 'progress', msg: 'كتابة البيانات...' });
        sheet1 = _workerPatchAllCells(sheet1, patches1);
        sheet2 = _workerPatchAllCells(sheet2, patches2);
        sheet3 = _workerPatchAllCells(sheet3, patches3);

        files['xl/worksheets/sheet1.xml'] = new TextEncoder().encode(sheet1);
        files['xl/worksheets/sheet2.xml'] = new TextEncoder().encode(sheet2);
        files['xl/worksheets/sheet3.xml'] = new TextEncoder().encode(sheet3);

        postMessage({ status: 'progress', msg: 'ضغط الملف...' });
        const result = await _workerZipWrite(files);
        postMessage({ status: 'done', result: result.buffer }, [result.buffer]);
    } catch(err) {
        postMessage({ status: 'error', msg: err.message || String(err) });
    }
};`;
            return new Blob([fns + '\n\n' + handler], { type: 'application/javascript' });
        }

        let _exportingExcel = false;
        async function exportExcel() {
            if (_exportingExcel) { showToast('جاري التصدير بالفعل، يرجى الانتظار...'); return; }
            _exportingExcel = true;
            showToast('جاري تجهيز الملف...');

            try {
                const templateBuf = await loadExcelTemplate();

                // Spin up a fresh worker from serialized functions (no escaping issues)
                const workerUrl  = URL.createObjectURL(_buildWorkerBlob());
                const worker     = new Worker(workerUrl);
                URL.revokeObjectURL(workerUrl);

                // Send a COPY of the template buffer (transferable) + plain data
                const templateCopy = templateBuf.slice().buffer;

                await new Promise((resolve, reject) => {
                    worker.onmessage = (e) => {
                        const { status, msg, result } = e.data;
                        if (status === 'progress') {
                            showToast(msg);
                        } else if (status === 'done') {
                            worker.terminate();
                            const blob = new Blob([result], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                            const url2 = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            const fname = (meta.hospitalName || 'وحدة') + '_' + (meta.dates || new Date().toISOString().slice(0, 10)) + '.xlsx';
                            a.href = url2; a.download = fname;
                            document.body.appendChild(a); a.click(); document.body.removeChild(a);
                            setTimeout(() => URL.revokeObjectURL(url2), 10000);
                            showToast('✓ تم تصدير الملف بنجاح');
                            resolve();
                        } else if (status === 'error') {
                            worker.terminate();
                            reject(new Error(msg));
                        }
                    };
                    worker.onerror = (e) => { worker.terminate(); reject(new Error(e.message)); };

                    worker.postMessage({
                        templateBuf: templateCopy,
                        scores:  JSON.parse(JSON.stringify(scores)),
                        notes:   JSON.parse(JSON.stringify(notes)),
                        ROW_MAP: ROW_MAP,
                        meta:    { dates: meta.dates, hospitalName: meta.hospitalName, inspectors: meta.inspectors }
                    }, [templateCopy]);
                });

            } catch (e) {
                console.error(e);
                showToast('خطأ في التصدير: ' + e.message);
            } finally {
                _exportingExcel = false;
            }
        }

        function xmlEsc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
        }

        function arabicDay(date) {
            const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            return days[date.getDay()];
        }

        function formatArabicDate(dateStr) {
            if (!dateStr) return '';
            let d = null;
            const dmyMatch = dateStr.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
            if (dmyMatch) {
                d = new Date(parseInt(dmyMatch[3]), parseInt(dmyMatch[2]) - 1, parseInt(dmyMatch[1]));
            } else {
                const isoMatch = dateStr.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
                if (isoMatch) {
                    d = new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
                }
            }
            if (!d || isNaN(d)) {
                return dateStr;
            }
            const day = arabicDay(d);
            const dd = d.getDate();
            const mm = d.getMonth() + 1;
            const yyyy = d.getFullYear();
            return day + ' الموافق ' + dd + '/' + mm + '/' + yyyy;
        }

        function buildWordTableRow(sectionTitle, negativesNotes, scorePct) {
            let negParas = '';
            const textEntries = negativesNotes.filter(note => note !== null);
            if (textEntries.length === 0) {
                negParas = `<w:p><w:pPr><w:bidi/></w:pPr></w:p>`;
            } else {
                negParas = textEntries.map(note => {
                    const clean = note.replace(/\r\n/g, ' ').replace(/\n/g, ' ').trim();
                    return `<w:p>
                  <w:pPr>
                    <w:bidi/>
                    <w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr>
                    <w:rPr><w:rFonts w:asciiTheme="majorBidi" w:hAnsiTheme="majorBidi" w:cstheme="majorBidi"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:lang w:bidi="ar-EG"/></w:rPr>
                  </w:pPr>
                  <w:r>
                    <w:rPr><w:rFonts w:asciiTheme="majorBidi" w:hAnsiTheme="majorBidi" w:cstheme="majorBidi"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:lang w:bidi="ar-EG"/></w:rPr>
                    <w:t xml:space="preserve">${xmlEsc(clean)}</w:t>
                  </w:r>
                </w:p>`;
                }).join('\n');
            }

            return `<w:tr>
          <w:tc>
            <w:tcPr><w:tcW w:w="1626" w:type="dxa"/><w:vAlign w:val="center"/></w:tcPr>
            <w:p>
              <w:pPr><w:bidi/><w:jc w:val="center"/><w:rPr><w:rFonts w:asciiTheme="majorBidi" w:hAnsiTheme="majorBidi" w:cstheme="majorBidi"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:lang w:bidi="ar-EG"/></w:rPr></w:pPr>
              <w:r><w:rPr><w:rFonts w:asciiTheme="majorBidi" w:hAnsiTheme="majorBidi" w:cstheme="majorBidi"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:lang w:bidi="ar-EG"/></w:rPr><w:t>${xmlEsc(sectionTitle)}</w:t></w:r>
            </w:p>
          </w:tc>
          <w:tc>
            <w:tcPr><w:tcW w:w="6475" w:type="dxa"/><w:vAlign w:val="center"/></w:tcPr>
            ${negParas}
          </w:tc>
          <w:tc>
            <w:tcPr><w:tcW w:w="916" w:type="dxa"/><w:vAlign w:val="center"/></w:tcPr>
            <w:p>
              <w:pPr><w:bidi/><w:jc w:val="center"/><w:rPr><w:rFonts w:asciiTheme="majorBidi" w:hAnsiTheme="majorBidi" w:cstheme="majorBidi"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:lang w:bidi="ar-EG"/></w:rPr></w:pPr>
              <w:r><w:rPr><w:rFonts w:asciiTheme="majorBidi" w:hAnsiTheme="majorBidi" w:cstheme="majorBidi"/><w:sz w:val="22"/><w:szCs w:val="22"/><w:rtl/><w:lang w:bidi="ar-EG"/></w:rPr><w:t>${xmlEsc(scorePct)}</w:t></w:r>
            </w:p>
          </w:tc>
        </w:tr>`;
        }

        function showWordSectionPicker() {

                sec.subsections.forEach(sub => {
                    sub.items.forEach(item => {
                        const ik = `${sec.key}__${idx}`;
                        const sc = scores[ik];

                        if (sc === 0 || sc === 1) { hasNeg = true; if (note && note.trim()) hasNotes = true; }
                        if (sc === 2 && note && note.trim()) hasNotes = true;

        async function doExportWord() {
            const selectedKeys = new Set(
                [...document.querySelectorAll('.wpck-cb:checked')].map(cb => cb.dataset.key)
            );
            if (selectedKeys.size === 0) { showToast('يرجى تحديد قسم واحد على الأقل'); return; }
            document.getElementById('wordPickerModal').remove();

            showToast('جاري إنشاء تقرير Word...');
            await new Promise(r => setTimeout(r, 50));
            try {
                const templateBuf = await loadWordTemplate();
                const files = await zipRead(templateBuf);
                let docXml = new TextDecoder('utf-8').decode(files['word/document.xml']);

                docXml = docXml.replace(
                    /<w:t[^>]*>ال<\/w:t>(\s*<\/w:r>\s*<\/w:tc>|[\s\S]*?)<w:t[^>]*>سلبيات<\/w:t>/,
                    (m) => m.replace(/ال<\/w:t>/, 'الملاحظات</w:t>').replace(/<w:t[^>]*>سلبيات<\/w:t>/, '<w:t></w:t>')
                );
                docXml = docXml.replace(/<w:t[^>]*>السلبيات<\/w:t>/g, '<w:t>الملاحظات</w:t>');

                const hospitalName = meta.hospitalName || meta.hospital || '';
                docXml = docXml.replace(/&lt;&lt;hospital name&gt;&gt;/gi, xmlEsc(hospitalName));
                docXml = docXml.replace(/<<hospital name>>/gi, xmlEsc(hospitalName));

                const rawDate = meta.dates || '';
                const arabicDate = formatArabicDate(rawDate);
                docXml = docXml.replace(/&lt;&lt;Date&gt;&gt;/gi, xmlEsc(arabicDate));
                docXml = docXml.replace(/<<Date>>/gi, xmlEsc(arabicDate));

                const tableRows = FORM_DATA
                    .filter(sec => selectedKeys.has(sec.key))
                    .map(sec => {
                        const { earned, effectiveMax } = getSectionScore(sec.key);
                        const pct = effectiveMax > 0 ? Math.round(earned / effectiveMax * 100) + '%' : '0%';

                        const notesList = [];
                        let idx = 0;
                        sec.subsections.forEach(sub => {
                            sub.items.forEach(item => {
                                const ik = `${sec.key}__${idx}`;
                                const sc = scores[ik];
                                const note = notes[ik];
                                if ((sc === 0 || sc === 1) && note && note.trim()) {
                                    notesList.push(note.trim());
                                } else if (sc === 2 && note && note.trim()) {
                                    notesList.push(note.trim());
                                }
                                idx++;
                            });
                        });

                        return buildWordTableRow(sec.title, notesList, pct);
                    }).join('\n');

                const trMatches = [...docXml.matchAll(/<w:tr[ >][\s\S]*?<\/w:tr>/g)];
                if (trMatches.length >= 2) {
                    const secondTr = trMatches[1];
                    docXml = docXml.slice(0, secondTr.index) + tableRows + docXml.slice(secondTr.index + secondTr[0].length);
                }

                files['word/document.xml'] = new TextEncoder().encode(docXml);

                showToast('جاري حفظ الملف...');
                await new Promise(r => setTimeout(r, 30));
                const result = await zipWrite(files);

                const fname = `تقرير_${hospitalName || 'الوحدة'}_${rawDate || new Date().toLocaleDateString('ar-EG')}.docx`;
                const blob = new Blob([result], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
                const url2 = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url2; a.download = fname;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url2), 10000);
                showToast('✓ تم تصدير تقرير Word بنجاح');
            } catch(e) {
                console.error(e);
                showToast('خطأ في تصدير Word: ' + e.message);
            }
        }

        function setScore(ik, val, secKey) {
            const [secKeyFromIk, idxStr] = ik.split('__');
            const idx = parseInt(idxStr);
            const sec = FORM_DATA.find(s => s.key === secKeyFromIk);
            let item = null;
            let counter = 0;
            if (sec) {
                for (const sub of sec.subsections) {
                    for (const it of sub.items) {
                        if (counter === idx) { item = it; break; }
                        counter++;
                    }
                    if (item) break;
                }
            }
            
            if (item && item.binaryOnly === true && val === 1) {
                showToast('هذا العنصر تقييمه فقط (0/2/N/A)');
                return;
            }

            scores[ik] = val;
            const row = document.getElementById(`irow-${ik}`);
            if (row) {
                row.classList.remove('scored-0', 'scored-1', 'scored-2', 'scored-na');
                if (val === 0) row.classList.add('scored-0');
                else if (val === 1) row.classList.add('scored-1');
                else if (val === 2) row.classList.add('scored-2');
                else if (val === 'N/A') row.classList.add('scored-na');

        function getSectionScore(key) {
            const sec = FORM_DATA.find(s => s.key === key);
            if (!sec) return { earned: 0, effectiveMax: 0 };
            let earned = 0, effectiveMax = 0, idx = 0;
            sec.subsections.forEach(sub => sub.items.forEach(() => {
                const sc = scores[`${key}__${idx}`];
                if (sc === 0 || sc === 1 || sc === 2) {
                    effectiveMax += 2;
                    if (sc === 1) earned += 1;
                    else if (sc === 2) earned += 2;
                }
                idx++;
            }));
            return { earned, effectiveMax };
        }

        function updateSectionScoreDisplay(key) {
            const sec = FORM_DATA.find(s => s.key === key);
            if (!sec) return;
            const { earned, effectiveMax: secEffMax } = getSectionScore(key);
            const pct = secEffMax > 0 ? Math.round(earned / secEffMax * 100) : 0;
            const el = document.getElementById(`sec-score-${key}`);
            const pctEl = document.getElementById(`sec-pct-${key}`);
            if (el) el.textContent = earned;
            if (pctEl) {
                pctEl.textContent = `${pct}%`;
                const c = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--orange)' : pct > 0 ? 'var(--red)' : 'var(--text-dim)';
                pctEl.style.color = c; pctEl.style.background = c.replace(')', ',0.1)').replace('var(', 'rgba(').replace('--green', '16,138,74').replace('--orange', '211,84,0').replace('--red', '192,57,43').replace('--text-dim', '138,154,176');
            }
        }

        function countAnswered(key) {
            const sec = FORM_DATA.find(s => s.key === key); if (!sec) return 0;

        }
        function countTotal(key) {
            const sec = FORM_DATA.find(s => s.key === key); if (!sec) return 0;
            return sec.subsections.reduce((a, s) => a + s.items.length, 0);

        function updateProgress() {
            const total = FORM_DATA.reduce((a, s) => a + countTotal(s.key), 0);

        function saveToLocal() {

                localStorage.setItem(STORAGE_KEY, JSON.stringify({ scores, notes, meta, savedAt: new Date().toISOString() }));

            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

        function loadSharedExcelFile(name, base64) {
            try {
                const binary = atob(base64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const blob = new Blob([bytes], {
                    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
                });
                const file = new File([blob], name || 'shared.xlsx', { type: blob.type });

                if (typeof showToast === 'function') showToast('📂 جاري تحميل الملف المشارك: ' + (name || ''));
                const fakeEvent = { target: { files: [file] } };
                if (typeof handleFileUpload === 'function') {
                    handleFileUpload(fakeEvent);
                }
            } catch (err) {
                console.error('[Share] Failed to load shared file:', err);
                if (typeof showToast === 'function') showToast('خطأ في تحميل الملف المشارك');
            }
        }

        navigator.serviceWorker && navigator.serviceWorker.addEventListener('message', event => {
            if (event.data && event.data.type === 'SHARED_FILE') {
                loadSharedExcelFile(event.data.name, event.data.data);
            }
        });

        async function checkPendingSharedFile() {
            if (!('caches' in window) || !('serviceWorker' in navigator)) return;
            try {
                const reg = await navigator.serviceWorker.ready;
                const sw = reg.active;
                if (!sw) return;

                const cacheName = await new Promise((resolve, reject) => {
                    const mc = new MessageChannel();
                    const timer = setTimeout(() => reject(new Error('GET_CACHE_NAME timeout')), 3000);
                    mc.port1.onmessage = (e) => {
                        if (e.data && e.data.type === 'CACHE_NAME') {
                            clearTimeout(timer);
                            resolve(e.data.cacheName);
                        }
                    };
                    sw.postMessage({ type: 'GET_CACHE_NAME' }, [mc.port2]);
                });

                const sharedFileKey = location.origin + '/PHC/shared-file';
                const cache = await caches.open(cacheName);
                const response = await cache.match(sharedFileKey);
                if (!response) return;
                const payload = await response.json();
                if (!payload || !payload.data) return;

                if (Date.now() - payload.timestamp > 5 * 60 * 1000) {
                    await cache.delete(sharedFileKey);
                    return;
                }

                await cache.delete(sharedFileKey);
                setTimeout(() => loadSharedExcelFile(payload.name, payload.data), 600);
            } catch (err) {
                console.error('[Share] checkPendingSharedFile error:', err);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(() => checkPendingSharedFile());
        }

        function scrollToNextUnanswered() {
            const allRows = document.querySelectorAll('.item-row');
            let found = false;
            
            for (let row of allRows) {
                const isAnswered = row.classList.contains('scored-0') || 
                                   row.classList.contains('scored-1') || 
                                   row.classList.contains('scored-2') || 
                                   row.classList.contains('scored-na');
                
                if (!isAnswered && !found) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.style.transition = 'background-color 0.3s';
                    row.style.backgroundColor = '#fff3cd';
                    setTimeout(() => {
                        row.style.backgroundColor = '';
                    }, 2000);
                    found = true;
                    break;
                }
            }
            
            if (!found) {
                if (currentSection === 'home' || currentSection === 'summary') {
                    showToast('📋 انتقل إلى قسم ثم استخدم الزر مرة أخرى');
                } else {
                    showToast('✓ جميع العناصر في هذا القسم مكتملة!');
                }
            }
        }

        // Install banner handlers
        let deferredPrompt;
        const installBanner = document.getElementById('installBanner');
        const btnInstall = document.getElementById('btnInstall');
        const btnCancel = document.getElementById('btnCancel');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'block';

            btnInstall.addEventListener('click', () => {
                installBanner.style.display = 'none';
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    } else {
                        console.log('User dismissed the install prompt');
                    }
                    deferredPrompt = null;
                });
            });
        });

        btnCancel.addEventListener('click', () => {
            installBanner.style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
        });
    </script>
</body>
</html>
