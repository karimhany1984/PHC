// Search reports by criteria
async function searchReports(criteria) {
    const db = await openDB();
    const allReports = await getAllReports(1000, 0);
    db.close();
    
    return allReports.filter(report => {
        if (criteria.hospitalName && !report.hospitalName.includes(criteria.hospitalName)) return false;
        if (criteria.dateFrom && report.inspectionDate < criteria.dateFrom) return false;
        if (criteria.dateTo && report.inspectionDate > criteria.dateTo) return false;
        if (criteria.minPercentage && report.percentage < criteria.minPercentage) return false;
        return true;
    });
}

// Import Excel with conflict resolution
async function importExcelWithOptions(file, importMode = 'new') {
    const buf = new Uint8Array(await file.arrayBuffer());
    const zipFiles = await zipRead(buf);

    const sheet1xml = new TextDecoder().decode(zipFiles['xl/worksheets/sheet1.xml']);
    const sheet2xml = zipFiles['xl/worksheets/sheet2.xml']
        ? new TextDecoder().decode(zipFiles['xl/worksheets/sheet2.xml']) : '';
    const sheet3xml = zipFiles['xl/worksheets/sheet3.xml']
        ? new TextDecoder().decode(zipFiles['xl/worksheets/sheet3.xml']) : '';
    const ssRaw = new TextDecoder().decode(zipFiles['xl/sharedStrings.xml']);

    // ── Parse shared strings (same as handleFileUpload) ──────────────
    const ssItems = [];
    ssRaw.replace(/<si>([\s\S]*?)<\/si>/g, (_, inner) => {
        let txt = '';
        inner.replace(/<t[^>]*>([^<]*)<\/t>/g, (__, t) => { txt += t; });
        ssItems.push(txt.trim());
    });

    // ── Cell reader (identical logic to handleFileUpload) ─────────────
    const readCell = (sheetXml, cellRef) => {
        // First check for a self-closing tag (no value, e.g. <c r="F44" s="7"/>)
        const scRe = new RegExp('<c\\s[^>]*r="' + cellRef + '"[^>]*/\\s*>');
        if (scRe.test(sheetXml)) return null;
        // Row-boundary guard: [^<]*(?:<(?!\/row>)[^<]*)* prevents crossing </row>
        const re = new RegExp('<c\\s[^>]*r="' + cellRef + '"[^>]*>[^<]*(?:<(?!\\/row>)[^<]*)*<\\/c>');
        const m = sheetXml.match(re);
        if (!m) return null;
        const xml = m[0];
        const v = xml.match(/<v>([^<]*)<\/v>/);
        if (!v) return null;
        if (/\bt="s"/.test(xml)) {
            const si = parseInt(v[1]);
            return (!isNaN(si) && ssItems[si] !== undefined) ? ssItems[si] : null;
        }
        if (/\bt="str"/.test(xml)) return v[1];
        return v[1];
    };

    // ── Parse score value string → 0/1/2/'N/A'/undefined ─────────────
    const parseScore = (raw) => {
        if (raw === null || raw === undefined) return undefined;
        const v = String(raw).trim();
        if (v === 'N/A')              return 'N/A';
        if (v === '0' || v === '0.0') return 0;
        if (v === '1' || v === '1.0') return 1;
        if (v === '2' || v === '2.0') return 2;
        return undefined;
    };

    // ── Read metadata from sheet3 ──────────────────────────────────────
    // Sheet3 layout (confirmed from XML):
    //   B3 = hospital name value (merged B3:D3)
    //   F3 = date value
    //   F4 = inspector value
    const importedMeta = {
        hospitalName: (readCell(sheet3xml, 'B3') || '').trim(),
        dates:        (readCell(sheet3xml, 'F3') || '').trim(),
        inspectors:   (readCell(sheet3xml, 'F4') || '').trim(),
        type:         ''
    };

    // Detect region from hospital name
    let importedRegion = '';
    for (const [reg, units] of Object.entries(REGION_UNITS)) {
        if (units.includes(importedMeta.hospitalName)) { importedRegion = reg; break; }
    }

    const importedScores = {};
    const importedNotes  = {};

    // ── Read all scores and notes ──────────────────────────────────────
    // Confirmed column mapping:
    //
    // Sheet1 (العيادات):
    //   Regular rows (ROW_MAP positive, < 20000): score=E, note=F
    //   Counseling rows (ROW_MAP >= 20000, absRow = exRow-20000):
    //     rows 508-526: score=H, note=F
    //     rows 527-559: score=H, note=C
    //
    // Sheet2 (مبادرات-البان):
    //   Regular initiatives (ROW_MAP negative, rows 6-145): score=G, note=F
    //   Milk section (rows 152-166): score=G, note=C

    FORM_DATA.forEach(sec => {
        let idx = 0;
        sec.subsections.forEach(sub => sub.items.forEach(() => {
            const mapKey = sec.key + '__' + idx;
            const exRow  = ROW_MAP[mapKey];

            if (exRow !== undefined) {
                const onSheet2 = exRow < 0;
                const onColH   = exRow >= 20000;
                const absRow   = onColH ? exRow - 20000 : Math.abs(exRow);
                const sheetXml = (onSheet2) ? sheet2xml : sheet1xml;

                if (!sheetXml) { idx++; return; }

                let scoreCol, noteCol;

                if (onSheet2) {
                    // Sheet2: score always G
                    // note: F for initiatives (rows 6-145), C for milk (rows 152+)
                    scoreCol = 'G';
                    noteCol  = absRow >= 152 ? 'C' : 'F';
                } else if (onColH) {
                    // Sheet1 counseling section
                    // score always H
                    // note: F for rows 508-526 (labeled items), C for rows 527-559 (checklist items)
                    scoreCol = 'H';
                    noteCol  = absRow <= 526 ? 'F' : 'C';
                } else {
                    // Sheet1 regular sections: score=E, note=F
                    scoreCol = 'E';
                    noteCol  = 'F';
                }

                const sc = parseScore(readCell(sheetXml, scoreCol + absRow));
                if (sc !== undefined) importedScores[mapKey] = sc;

                const note = readCell(sheetXml, noteCol + absRow);
                if (note && String(note).trim() && !/^\d+(\.\d+)?$/.test(String(note).trim())) importedNotes[mapKey] = String(note).trim();
            }
            idx++;
        }));
    });

    // ── Apply based on chosen mode ─────────────────────────────────────
    const applyMeta = () => {
        meta.hospitalName = importedMeta.hospitalName;
        meta.dates        = importedMeta.dates;
        meta.inspectors   = importedMeta.inspectors;
        if (importedMeta.type) meta.type = importedMeta.type;
        if (importedRegion)    meta.region = importedRegion;
    };

    if (importMode === 'replace') {
        applyMeta();
        scores = importedScores;
        notes  = importedNotes;
        updateMetaResult();
        saveToLocal();
        buildSidebarNav();
        updateProgress();
        showHome();
        showToast('✓ تم استبدال البيانات الحالية');

    } else if (importMode === 'merge') {
        // Only fill gaps — don't overwrite existing answers
        Object.keys(importedScores).forEach(k => {
            if (scores[k] === undefined) scores[k] = importedScores[k];
        });
        Object.keys(importedNotes).forEach(k => {
            if (!notes[k] && importedNotes[k]) notes[k] = importedNotes[k];
        });
        updateMetaResult();
        saveToLocal();
        buildSidebarNav();
        updateProgress();
        showHome();
        showToast('✓ تم دمج البيانات الجديدة');

    } else {
        // 'new' — save as a fresh database record without disturbing current session
        const tempMeta   = { ...meta };
        const tempScores = { ...scores };
        const tempNotes  = { ...notes };

        applyMeta();
        scores = importedScores;
        notes  = importedNotes;

        await saveToDatabase();

        meta   = tempMeta;
        scores = tempScores;
        notes  = tempNotes;
        updateMetaResult();
        showToast('✓ تم استيراد التقرير كسجل جديد');
    }

    return { importedMeta, importedScores, importedNotes };
}

async function exportSingleReport(id) {
    const db = await openDB();
    const report = await new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(id);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
    db.close();
    
    if (report) {
        // Temporarily swap current data with report data
        const tempMeta = { ...meta };
        const tempScores = { ...scores };
        const tempNotes = { ...notes };
        
        meta = { ...report };
        scores = report.scores || {};
        notes = report.notes || {};
        
        await exportExcel();
        
        // Restore
        meta = tempMeta;
        scores = tempScores;
        notes = tempNotes;
    }
}

async function exportAllReports() {
    const reports = await getAllReports();
    if (reports.length === 0) {
        showToast('لا توجد تقارير للتصدير');
        return;
    }
    
    // Create a downloadable JSON export
    const exportData = {
        exportedAt: new Date().toISOString(),
        reportCount: reports.length,
        reports: reports,
        fullData: await Promise.all(reports.map(async (r) => {
            const db = await openDB();
            const full = await new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(r.id);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
            db.close();
            return full;
        }))
    };
    
    const jsonStr = JSON.stringify(exportData, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `all_reports_${new Date().toISOString().slice(0, 19)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(`✓ تم تصدير ${reports.length} تقرير`);
}
// Import a JSON file containing one or more reports into IndexedDB
async function importDatabaseFromJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json, .json';
    input.onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        
        try {
            showToast('⏳ جاري قراءة ملف JSON...');
            const text = await file.text();
            const data = JSON.parse(text);
            
            // Validate structure: must have fullData array
            if (!data.fullData || !Array.isArray(data.fullData) || data.fullData.length === 0) {
                showToast('⚠️ الملف لا يحتوي على تقارير صالحة (fullData مفقود أو فارغ)');
                return;
            }
            
            showToast(`⏳ جاري استيراد ${data.fullData.length} تقرير...`);
            
            let importedCount = 0;
            let skippedCount = 0;
            
            for (const report of data.fullData) {
                // Basic validation of each report
                if (!report.hospitalName && !report.totalEarned && !report.scores) {
                    skippedCount++;
                    continue;
                }
                
                // Remove the original id (if exists) to let IndexedDB auto‑generate a new one
                const { id, ...cleanReport } = report;
                
                // Ensure required fields exist
                const reportToSave = {
                    ...cleanReport,
                    savedAt: cleanReport.savedAt || new Date().toISOString(),
                    recordName: cleanReport.recordName || `${cleanReport.hospitalName || 'تقرير'}_${cleanReport.inspectionDate || 'تاريخ غير معروف'}`
                };
                
                // Add to database
                await addReportToDatabase(reportToSave);
                importedCount++;
                
                // Small yield to keep UI responsive
                if (importedCount % 5 === 0) {
                    await new Promise(r => setTimeout(r, 10));
                }
            }
            
            showToast(`✅ تم استيراد ${importedCount} تقرير${skippedCount ? `، تم تخطي ${skippedCount} تقرير غير صالح` : ''}`);
            
            // Refresh the reports list if we are currently viewing it
            if (currentSection === 'reports') {
                renderReportsList(currentReportFilters);
            }
        } catch (err) {
            console.error('Import error:', err);
            showToast('❌ خطأ في قراءة الملف: ' + err.message);
        } finally {
    input.remove();
    // Refresh the reports list if we are currently viewing it
    if (currentSection === 'reports') {
        renderReportsList(currentReportFilters);
    }
}
    };
    input.click();
}

// Helper: add a single report object to IndexedDB (auto‑increment id)
async function addReportToDatabase(reportData) {
    const db = await openDB();
    return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.add(reportData);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => db.close();
    });
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

        function parseDate(dateStr) {
            if (!dateStr) return null;
            // try YYYY-MM-DD
            let m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
            // try DD/MM/YYYY
            m = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (m) return new Date(parseInt(m[3]), parseInt(m[2])-1, parseInt(m[1]));
            // fallback
            const d = new Date(dateStr);
            return isNaN(d) ? null : d;
        }

        : hospitals;

    // Apply filters

        if (filters.region && r.region !== filters.region) return false;
        if (filters.hospitalName && r.hospitalName !== filters.hospitalName) return false;
        if (filters.governorate && r.governorate !== filters.governorate) return false;
        if (filters.year || filters.month) {
            const d = parseDate(r.inspectionDate);
            if (!d) return false;
            if (filters.year && d.getFullYear() != filters.year) return false;
            if (filters.month && (d.getMonth()+1) != filters.month) return false;
        }
        return true;
    });

    const totalReports = allReports.length;
    const count = filtered.length;

        if (dc) {
            var dd = [_g, _m, _b];
            var dl = ['جيد', 'متوسط', 'ضعيف'];
            var dc2 = ['#1a8a4a', '#e8a020', '#c0392b'];
            if (_n > 0) { dd.push(_n); dl.push('بلا بيانات'); dc2.push('#d4dde8'); }
            new Chart(dc, {
                type: 'doughnut',
                data: { labels: dl, datasets: [{ data: dd, backgroundColor: dc2, borderWidth: 2, borderColor: '#fff' }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return ctx.label + ': ' + ctx.parsed + ' أقسام'; } } } } }
            });
        }
    }

    if (typeof Chart !== 'undefined') {
        _drawCharts();
    } else {
        var _cs = document.createElement('script');
        _cs.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
        _cs.onload = _drawCharts;
        document.head.appendChild(_cs);
    }
}

        async function exportAnalysisToExcel() {
            const allReports = await getAllReports();
            let filtered = allReports.filter(r => {
                if (currentAnalysisFilters.region && r.region !== currentAnalysisFilters.region) return false;
                if (currentAnalysisFilters.hospitalName && r.hospitalName !== currentAnalysisFilters.hospitalName) return false;
                if (currentAnalysisFilters.governorate && r.governorate !== currentAnalysisFilters.governorate) return false;
                if (currentAnalysisFilters.year || currentAnalysisFilters.month) {
                    const d = parseDate(r.inspectionDate);
                    if (!d) return false;
                    if (currentAnalysisFilters.year && d.getFullYear() != currentAnalysisFilters.year) return false;
                    if (currentAnalysisFilters.month && (d.getMonth()+1) != currentAnalysisFilters.month) return false;
                }
                return true;
            });
            let csvRows = [['المنطقة', 'اسم الوحدة', 'المحافظة', 'تاريخ التقييم', 'النسبة المئوية', 'النقاط المحققة', 'النقاط القصوى']];
            filtered.forEach(r => {
                csvRows.push([r.region || '', r.hospitalName, r.governorate, r.inspectionDate, r.percentage, r.totalEarned, r.totalMax]);
            });
            const csvContent = csvRows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'analysis_report.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast('✓ تم تصدير التحليل كملف CSV');
        }

        // ═══════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════
        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function clearPageScores() {
            const sec = FORM_DATA.find(s => s.key === currentSection);
            if (!sec) return;
            let idx = 0;
            sec.subsections.forEach(sub => {
                sub.items.forEach(() => {
                    const ik = `${currentSection}__${idx}`;
                    delete scores[ik];
                    const row = document.getElementById(`irow-${ik}`);
                    if (row) {
                        row.classList.remove('scored-0','scored-1','scored-2','scored-na');
                        // Remove active class from all score buttons in this row
                        row.querySelectorAll('.sbtn[data-score]').forEach(b => {
                            b.classList.remove('s0','s1','s2','sna');
                        });
                    }
                    idx++;
                });
            });
            saveData();
            updateSidebarScore(currentSection);
            showToast('تم مسح إجابات الصفحة');
        }
